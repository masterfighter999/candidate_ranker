# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"
  # add "GitHub Copilot", "ChatGPT", "Cursor", etc. here if you also used them

ai_usage_summary: |
  Claude was used in two phases. Phase 1: collaborative extraction of a
  structured rule spec (jd_spec_fixed.json) from the prose job description,
  including manual verification of the company-founding-year honeypot
  reference table against the full 100K-candidate dataset. Phase 2: the
  candidate scoring notebook was independently written and run by the
  participant; Claude was then used to review the run for correctness
  against real sample/full data, identify and explain specific bugs (e.g.
  skills[]-only keyword matches receiving undiscounted full credit;
  honeypot-detection over-firing from an unthresholded date check; a
  disqualifier rule whose evidence-gathering was vulnerable to the same
  keyword-stuffing pattern it was meant to catch), and implement the
  corresponding fixes directly in the notebook. All bug diagnoses were
  verified empirically against the real candidates.jsonl before being
  applied, and the resulting fixed notebook was independently re-run by
  the participant in their own Colab environment, producing a
  byte-identical submission.csv to the verification run. No candidate data
  was sent to any LLM API as part of the scoring pipeline itself — Claude's
  involvement was code review and Phase 1 spec-authoring, not part of the
  CPU-only, no-network ranking step.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Two-phase, rule-based ranker. Phase 1 (offline, one-time, uses an LLM):
  the prose job description is converted into a structured spec —
  required/bonus signal keyword sets with weights, hard/soft disqualifier
  definitions, experience-band and location/logistics scoring rules, and a
  verified company-founding-year table for honeypot detection. Phase 2
  (online, CPU-only, no network): pure-Python rules apply that spec to all
  100,000 candidates. Composite score combines seven weighted dimensions
  (required signals, experience fit, bonus signals, location/logistics,
  availability/freshness, hireability, verification), gated by a
  career-relevance multiplier that discounts candidates whose career
  history is mostly outside the ML/AI track, and by hard disqualifiers
  (honeypot patterns, pure-research-no-production, no-recent-coding) that
  exclude candidates entirely. Keyword matching distinguishes three tiers
  of evidence: career-history narration (full weight), skills[]-only
  mentions discounted by proficiency/duration (partial weight, since this
  field is the primary locus of keyword-stuffing in the dataset), and
  summary/headline-only mentions (lower weight still). Honeypot detection
  uses two patterns: expert-proficiency skills with near-zero duration
  (≥3 simultaneous instances), and career start dates predating a known
  company's founding by ≥4 years — this threshold was tuned empirically
  against the full dataset's gap-size distribution, not assumed, after an
  unthresholded version over-flagged by >3x relative to the dataset's
  actual honeypot rate. Runtime: ~62-76 seconds for the full 100K pool on
  a 2-core CPU Colab instance, well under the 5-minute budget.

